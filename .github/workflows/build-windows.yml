name: Build Windows App

on:
  workflow_dispatch:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Download yt-dlp
        run: powershell -ExecutionPolicy Bypass -File scripts/download_tools.ps1

      - name: Build app folder
        run: powershell -ExecutionPolicy Bypass -File scripts/build_windows.ps1

      - name: Upload app folder
        uses: actions/upload-artifact@v4
        with:
          name: SimpleYTDLP-Windows-App-Folder
          path: dist/SimpleYTDLP
