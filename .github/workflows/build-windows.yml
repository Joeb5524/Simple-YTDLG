name: Build Windows Installer

on:
  workflow_dispatch:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Validate release tag version
        if: startsWith(github.ref, 'refs/tags/v')
        shell: powershell
        run: |
          $tagVersion = $env:GITHUB_REF_NAME -replace '^v', ''
          $appSource = Get-Content "simple_ytdlp\app.py" -Raw
          if ($appSource -notmatch 'APP_VERSION\s*=\s*"([^"]+)"') {
            throw "Could not read APP_VERSION from simple_ytdlp\app.py"
          }
          $appVersion = $Matches[1]
          if ($tagVersion -ne $appVersion) {
            throw "Release tag $env:GITHUB_REF_NAME does not match APP_VERSION $appVersion"
          }

      - name: Get dependencies
        run: powershell -ExecutionPolicy Bypass -File scripts/get_dependencies.ps1

      - name: Build GUI installer
        run: powershell -ExecutionPolicy Bypass -File scripts/install_gui.ps1 -BuildOnly

      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: SimpleYTDLP-Windows-Installer
          path: installer/output/*.exe

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        shell: powershell
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $installer = Get-ChildItem "installer\output\*.exe" | Select-Object -First 1
          if (-not $installer) {
            throw "No installer was found in installer\output"
          }

          gh release create $env:GITHUB_REF_NAME `
            $installer.FullName `
            --title "SimpleYTDLP $env:GITHUB_REF_NAME" `
            --generate-notes `
            --verify-tag
